{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h5>Chat</h5>
    <a href="/dashboard" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="card p-3 shadow-sm mb-3" style="height:300px; overflow-y:auto;">
    {% for msg in messages %}
        <p><b>{{msg[1]}}:</b> {{msg[2]}}</p>
    {% endfor %}
</div>

<form method="POST" class="d-flex gap-2">
    <input name="message" class="form-control" placeholder="Type message...">
    <button class="btn btn-primary">Send</button>
</form>

{% endblock %}
